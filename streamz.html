
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My IPTV Player</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

header {
    background: #222;
    padding: 15px;
    text-align: center;
    font-size: 24px;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

.sidebar {
    width: 300px;
    background: #1b1b1b;
    overflow-y: auto;
}

.channel {
    padding: 12px;
    cursor: pointer;
    border-bottom: 1px solid #333;
}

.channel:hover {
    background: #333;
}

.player {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
}

video {
    width: 100%;
    height: 100%;
}
</style>

</head>

<body>

<header>📺 My IPTV Player</header>

<div class="container">

<div class="sidebar" id="channels">
Loading channels...
</div>

<div class="player">
<video id="video" controls autoplay></video>
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const playlistURL =
"https://m3u4u.com/m3u/26p5n37zqgf9xep2nv7j";


async function loadPlaylist(){

let response = await fetch(
"https://api.allorigins.win/raw?url=" 
+ encodeURIComponent(playlistURL)
);

let text = await response.text();


let lines = text.split("\n");

let channels = document.getElementById("channels");
channels.innerHTML = "";


for(let i = 0; i < lines.length; i++){

if(lines[i].startsWith("#EXTINF")) {

let name = lines[i].split(",")[1];
let url = lines[i+1];


let item = document.createElement("div");

item.className = "channel";

item.innerText = name;


item.onclick = function(){

play(url);

};


channels.appendChild(item);

}

}

}


function play(url){

let video = document.getElementById("video");


if(Hls.isSupported()){

let hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}
else {

video.src = url;

}

}


loadPlaylist();


</script>


</body>

</html>
